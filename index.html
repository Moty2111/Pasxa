<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Пасха · Кролик и яйца</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0f0b07;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: default;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    .hint {
      position: fixed;
      bottom: 20px;
      right: 24px;
      color: #f3e1b3;
      text-shadow: 0 2px 10px #2f1e0e;
      font-size: 15px;
      opacity: 0.75;
      background: rgba(30, 20, 10, 0.3);
      padding: 6px 18px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid #e6c38455;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 1px;
    }
    @media (max-width: 600px) {
      .hint {
        bottom: 12px;
        right: 12px;
        font-size: 12px;
        padding: 4px 12px;
      }
    }
  </style>
</head>
<body>
  <canvas id="easterCanvas"></canvas>
  <div class="hint">✨ светлой Пасхи ✨</div>

  <script>
    (function(){
      "use strict";

      const canvas = document.getElementById('easterCanvas');
      const ctx = canvas.getContext('2d');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      let time = 0;
      const particles = [];
      const PARTICLE_COUNT = 140;
      
      const greeting = {
        line1: 'Христос Воскрес!',
        line2: 'Светлой Пасхи,',
        name: 'любви',      
        line3: 'мира и добра'
      };

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: 2 + Math.random() * 7,
          speedX: (Math.random() - 0.5) * 0.08,
          speedY: (Math.random() - 0.5) * 0.1 - 0.02,
          opacity: 0.25 + Math.random() * 0.45,
          color: `hsl(${40 + Math.random() * 30}, 85%, 75%)`,
          phase: Math.random() * 100,
        });
      }

      function drawAnimatedBackground() {
        const w = canvas.width, h = canvas.height;
        const hue1 = 42 + Math.sin(time * 0.1) * 6;
        const hue2 = 195 + Math.sin(time * 0.15) * 12;
        const grad = ctx.createLinearGradient(0, 0, w * 0.7, h);
        grad.addColorStop(0, `hsl(${hue1}, 70%, 90%)`);
        grad.addColorStop(0.5, `hsl(${hue1 + 15}, 60%, 82%)`);
        grad.addColorStop(1, `hsl(${hue2}, 55%, 78%)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        const rad = ctx.createRadialGradient(w/2, h/2.5, 30, w/2, h/2, w*0.8);
        rad.addColorStop(0, `hsla(50, 80%, 96%, 0.2)`);
        rad.addColorStop(1, 'transparent');
        ctx.fillStyle = rad;
        ctx.globalCompositeOperation = 'overlay';
        ctx.fillRect(0, 0, w, h);
        ctx.globalCompositeOperation = 'source-over';
      }

      function shadeColor(col, percent) {
        let R = parseInt(col.substring(1,3),16);
        let G = parseInt(col.substring(3,5),16);
        let B = parseInt(col.substring(5,7),16);
        R = Math.min(255, Math.max(0, R + percent));
        G = Math.min(255, Math.max(0, G + percent));
        B = Math.min(255, Math.max(0, B + percent));
        return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
      }

      // ---------- КУЛИЧ ----------
      function drawKulich(cx, cy, w, h) {
        ctx.save();
        ctx.shadowColor = '#2a1a0e';
        ctx.shadowBlur = 45;
        ctx.shadowOffsetY = 20;
        
        ctx.beginPath();
        ctx.ellipse(cx, cy + h*0.18, w*0.55, h*0.18, 0, 0, Math.PI*2);
        ctx.fillStyle = '#8b5e36';
        ctx.fill();

        ctx.shadowOffsetY = 12;
        ctx.shadowBlur = 38;
        ctx.beginPath();
        ctx.rect(cx - w/2, cy - h*0.55, w, h);
        const doughGrad = ctx.createLinearGradient(cx - w/2, cy - h*0.4, cx + w/2, cy + h*0.3);
        doughGrad.addColorStop(0, '#dcaa74');
        doughGrad.addColorStop(0.5, '#c28b54');
        doughGrad.addColorStop(1, '#a66e3c');
        ctx.fillStyle = doughGrad;
        ctx.fill();

        ctx.shadowBlur = 8; ctx.shadowOffsetY = 4; ctx.globalAlpha = 0.35;
        for (let i=0; i<60; i++) {
          let fx = cx - w/2 + 10 + (i*27 % (w-20));
          let fy = cy - h*0.5 + (i*13 % h);
          ctx.beginPath(); ctx.arc(fx, fy, 2.2 + (i%3), 0, Math.PI*2); ctx.fillStyle = '#7a4f2a'; ctx.fill();
        }
        ctx.globalAlpha = 0.5;
        for (let i=0; i<20; i++) {
          let fx = cx - w/2 + 15 + (i*43 % (w-30));
          let fy = cy - h*0.45 + (i*31 % (h-10));
          ctx.beginPath(); ctx.arc(fx, fy, 3.5, 0, Math.PI*2); ctx.fillStyle = '#eac196'; ctx.fill();
        }
        ctx.globalAlpha = 1.0;

        ctx.shadowBlur = 30; ctx.shadowOffsetY = 10;
        ctx.beginPath();
        ctx.ellipse(cx, cy - h*0.55, w*0.5, h*0.14, 0, 0, Math.PI*2);
        const topGrad = ctx.createRadialGradient(cx-10, cy-h*0.6, 5, cx, cy-h*0.55, w*0.4);
        topGrad.addColorStop(0, '#c9955e'); topGrad.addColorStop(1, '#a66e3c');
        ctx.fillStyle = topGrad; ctx.fill();

        ctx.shadowColor = '#a08060'; ctx.shadowBlur = 35; ctx.shadowOffsetY = 10;
        ctx.beginPath();
        ctx.moveTo(cx - w*0.6, cy - h*0.65);
        ctx.quadraticCurveTo(cx - w*0.3, cy - h*0.82, cx, cy - h*0.85);
        ctx.quadraticCurveTo(cx + w*0.3, cy - h*0.82, cx + w*0.6, cy - h*0.65);
        ctx.quadraticCurveTo(cx + w*0.65, cy - h*0.45, cx + w*0.5, cy - h*0.2);
        ctx.quadraticCurveTo(cx + w*0.4, cy - h*0.35, cx + w*0.45, cy - h*0.5);
        ctx.quadraticCurveTo(cx + w*0.35, cy - h*0.3, cx + w*0.3, cy - h*0.5);
        ctx.quadraticCurveTo(cx + w*0.15, cy - h*0.45, cx + w*0.1, cy - h*0.5);
        ctx.quadraticCurveTo(cx, cy - h*0.25, cx - w*0.1, cy - h*0.5);
        ctx.quadraticCurveTo(cx - w*0.15, cy - h*0.45, cx - w*0.3, cy - h*0.5);
        ctx.quadraticCurveTo(cx - w*0.4, cy - h*0.35, cx - w*0.5, cy - h*0.2);
        ctx.quadraticCurveTo(cx - w*0.65, cy - h*0.45, cx - w*0.6, cy - h*0.65);
        ctx.closePath();
        
        const glazeGrad = ctx.createRadialGradient(cx-15, cy-h*0.72, 5, cx, cy-h*0.6, w*0.7);
        glazeGrad.addColorStop(0, '#fffef9'); glazeGrad.addColorStop(0.3, '#fef8ed'); glazeGrad.addColorStop(0.7, '#f5e3c8'); glazeGrad.addColorStop(1, '#e8d0ae');
        ctx.fillStyle = glazeGrad; ctx.fill();
        
        ctx.shadowBlur = 18; ctx.fillStyle = '#fffef9';
        ctx.beginPath(); ctx.ellipse(cx - w*0.45, cy - h*0.38, 14, 22, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx + w*0.45, cy - h*0.38, 14, 22, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx, cy - h*0.32, 12, 18, 0, 0, Math.PI*2); ctx.fill();

        ctx.shadowBlur = 25; ctx.shadowColor = '#ffffff'; ctx.globalAlpha = 0.7;
        ctx.beginPath(); ctx.ellipse(cx - w*0.18, cy - h*0.7, w*0.12, h*0.08, 0, 0, Math.PI*2); ctx.fillStyle = '#ffffff'; ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx + w*0.22, cy - h*0.68, w*0.1, h*0.06, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx, cy - h*0.75, w*0.08, h*0.05, 0, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;

        ctx.shadowBlur = 20; ctx.shadowColor = '#eec77a';
        const sprinkleColors = ['#f9d84a', '#e66b6b', '#5fb57a', '#b38bdd', '#f09b5a', '#6db1de', '#e6b0c2'];
        for (let s=0; s<70; s++) {
          let angle = (s * 53) % 360; let rad = angle * Math.PI/180; let dist = 18 + (s%6)*8;
          let sx = cx + Math.cos(rad) * (w*0.44 + (s%5)*2);
          let sy = cy - h*0.69 + Math.sin(rad*1.3)*11 + (s%7)*2;
          ctx.beginPath(); ctx.arc(sx, sy, 4.0, 0, Math.PI*2); ctx.fillStyle = sprinkleColors[s % sprinkleColors.length]; ctx.fill();
          ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.arc(sx-1.5, sy-1.5, 1.8, 0, Math.PI*2); ctx.fillStyle = '#fffbe3'; ctx.fill();
          ctx.shadowBlur = 20;
        }

        ctx.shadowBlur = 80; ctx.shadowColor = '#fff5d6'; ctx.globalAlpha = 0.25;
        ctx.beginPath(); ctx.ellipse(cx, cy - h*0.85, w*0.85, 20, 0, 0, Math.PI*2); ctx.fillStyle = '#ffffea'; ctx.fill();
        ctx.globalAlpha = 1.0;
        ctx.restore();
      }

      // ---------- ЯЙЦО ----------
      function drawEgg(cx, cy, w, h, baseColor, patternColor, patternType, rotationBase) {
        const rot = rotationBase + Math.sin(time * 1.8 + cx * 0.01) * 0.08;
        const bobY = Math.sin(time * 2.2 + cy * 0.02) * 5;
        ctx.save();
        ctx.translate(cx, cy + bobY);
        ctx.rotate(rot);
        ctx.beginPath(); ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI*2); ctx.clip();
        ctx.shadowColor = '#4d3522'; ctx.shadowBlur = 25; ctx.shadowOffsetY = 10;
        ctx.beginPath(); ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI*2);
        const grad = ctx.createRadialGradient(-w*0.25, -h*0.2, 5, 0, 0, w*0.6);
        grad.addColorStop(0, baseColor); grad.addColorStop(0.7, shadeColor(baseColor, -25));
        ctx.fillStyle = grad; ctx.fill();
        ctx.shadowBlur = 14; ctx.strokeStyle = '#c9a87c'; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.shadowBlur = 12; ctx.shadowOffsetY = 4; ctx.lineWidth = 2.5; ctx.strokeStyle = patternColor; ctx.fillStyle = patternColor;
        
        if (patternType === 'floral') {
          for (let i=0; i<8; i++) {
            let ang = i * 0.785 + time*0.05;
            let dx = Math.cos(ang)*w*0.25, dy = Math.sin(ang)*h*0.2;
            ctx.beginPath(); ctx.arc(dx, dy, 9, 0, Math.PI*2);
            const flowerGrad = ctx.createRadialGradient(dx-4, dy-4, 2, dx, dy, 9);
            flowerGrad.addColorStop(0, patternColor); flowerGrad.addColorStop(1, shadeColor(patternColor, -30));
            ctx.fillStyle = flowerGrad; ctx.fill();
            for (let p=0; p<6; p++) {
              let petAng = ang + p*1.0;
              let px = dx + Math.cos(petAng)*12, py = dy + Math.sin(petAng)*10;
              ctx.beginPath(); ctx.arc(px, py, 5, 0, 2*Math.PI); ctx.fillStyle = patternColor + 'cc'; ctx.fill();
            }
            ctx.shadowColor = '#f5d547';
            ctx.beginPath(); ctx.arc(dx-2, dy-2, 4.5, 0, Math.PI*2); ctx.fillStyle = '#fcebb0'; ctx.fill();
            ctx.shadowColor = '#6b5340';
          }
          ctx.beginPath(); ctx.arc(0, -h*0.12, 13, 0, Math.PI*2); ctx.fillStyle = patternColor; ctx.fill();
          ctx.beginPath(); ctx.arc(-3, -h*0.15, 6, 0, Math.PI*2); ctx.fillStyle = '#fdf0c2'; ctx.fill();
          ctx.lineWidth = 2; ctx.strokeStyle = '#eebb77';
          for (let l=0; l<10; l++) {
            let ang = l*0.62;
            ctx.beginPath(); ctx.moveTo(Math.cos(ang)*w*0.15, Math.sin(ang)*h*0.1); ctx.lineTo(Math.cos(ang)*w*0.35, Math.sin(ang)*h*0.25); ctx.stroke();
          }
        } else if (patternType === 'lace') {
          ctx.lineWidth = 3; ctx.strokeStyle = patternColor;
          for (let k=-1.2; k<=1.2; k+=0.6) {
            let offY = k * 28;
            ctx.beginPath();
            for (let x = -w/2+15; x < w/2-15; x+= 20) {
              let y = offY + Math.sin(x*0.22)*8;
              if (x === -w/2+15) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
          ctx.lineWidth = 2.5;
          for (let v=0; v<6; v++) {
            let vx = -w*0.25 + v*12;
            ctx.beginPath(); ctx.moveTo(vx, -h*0.25); ctx.quadraticCurveTo(vx+10, -h*0.35, vx, -h*0.45); ctx.strokeStyle = patternColor; ctx.stroke();
          }
          ctx.fillStyle = patternColor;
          for (let d=-1; d<=1; d+=0.7) { ctx.beginPath(); ctx.arc(d*20, -h*0.2, 5.5, 0, 2*Math.PI); ctx.fill(); }
          ctx.lineWidth = 1.5; ctx.strokeStyle = '#eebb77';
          for (let i=-w/2+12; i<w/2-12; i+=16) { ctx.beginPath(); ctx.moveTo(i, -h*0.35); ctx.lineTo(i+6, h*0.1); ctx.stroke(); }
        } else if (patternType === 'geometric') {
          ctx.lineWidth = 3.5; ctx.strokeStyle = patternColor;
          ctx.beginPath(); ctx.moveTo(-w*0.3, -h*0.3); ctx.lineTo(0, -h*0.45); ctx.lineTo(w*0.3, -h*0.3); ctx.lineTo(0, -h*0.15); ctx.closePath(); ctx.stroke();
          ctx.fillStyle = patternColor + '70'; ctx.fill();
          ctx.beginPath(); ctx.moveTo(-w*0.15, -h*0.28); ctx.lineTo(0, -h*0.38); ctx.lineTo(w*0.15, -h*0.28); ctx.lineTo(0, -h*0.2); ctx.closePath();
          const innerGrad = ctx.createLinearGradient(-w*0.12, -h*0.32, w*0.12, -h*0.24);
          innerGrad.addColorStop(0, '#fceeb4'); innerGrad.addColorStop(1, patternColor); ctx.fillStyle = innerGrad; ctx.fill();
          ctx.beginPath(); ctx.arc(0, h*0.14, 14, 0, Math.PI*2);
          const sphereGrad = ctx.createRadialGradient(-5, -5, 3, 0, 0, 14);
          sphereGrad.addColorStop(0, '#fdf0c2'); sphereGrad.addColorStop(1, patternColor); ctx.fillStyle = sphereGrad; ctx.fill();
          ctx.lineWidth = 2; ctx.strokeStyle = '#eebb77';
          ctx.beginPath(); ctx.moveTo(-w*0.35, -h*0.2); ctx.lineTo(-w*0.15, h*0.15); ctx.moveTo(w*0.35, -h*0.2); ctx.lineTo(w*0.15, h*0.15); ctx.stroke();
        }

        ctx.shadowBlur = 22; ctx.shadowColor = '#ffe8b0';
        ctx.beginPath(); ctx.ellipse(-w*0.18, -h*0.18, w*0.15, h*0.11, 0, 0, Math.PI*2); ctx.fillStyle = '#fffdf5e0'; ctx.fill();
        ctx.shadowBlur = 14;
        for (let g=0; g<10; g++) {
          let gx = -w*0.28 + (g*14); let gy = -h*0.32 + Math.sin(g*2+time*5)*5;
          ctx.beginPath(); ctx.arc(gx, gy, 2.5, 0, 2*Math.PI); ctx.fillStyle = `hsl(${50 + g*18}, 95%, 80%)`; ctx.fill();
        }
        ctx.restore();
      }

      // ---------- КРОЛИК (МУЛЬТЯШНЫЙ) ----------
      function drawRabbit(cx, cy, size) {
        ctx.save();
        ctx.shadowColor = '#5a3e2e';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetY = 8;
        
        // Тело
        ctx.fillStyle = '#e8d5c0';
        ctx.beginPath();
        ctx.ellipse(cx, cy, size*0.35, size*0.5, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Голова
        ctx.fillStyle = '#f0e3d4';
        ctx.beginPath();
        ctx.arc(cx, cy - size*0.45, size*0.25, 0, Math.PI*2);
        ctx.fill();
        
        // Уши
        ctx.fillStyle = '#e8d5c0';
        ctx.shadowBlur = 15;
        // Левое ухо
        ctx.beginPath();
        ctx.ellipse(cx - size*0.15, cy - size*0.8, size*0.08, size*0.25, -0.1, 0, Math.PI*2);
        ctx.fill();
        // Правое ухо
        ctx.beginPath();
        ctx.ellipse(cx + size*0.15, cy - size*0.8, size*0.08, size*0.25, 0.1, 0, Math.PI*2);
        ctx.fill();
        // Внутренняя часть ушей
        ctx.fillStyle = '#f5c6b1';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.ellipse(cx - size*0.15, cy - size*0.8, size*0.04, size*0.15, -0.1, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + size*0.15, cy - size*0.8, size*0.04, size*0.15, 0.1, 0, Math.PI*2);
        ctx.fill();
        
        // Глаза
        ctx.fillStyle = '#3a281a';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(cx - size*0.1, cy - size*0.5, size*0.05, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + size*0.1, cy - size*0.5, size*0.05, 0, Math.PI*2);
        ctx.fill();
        // Блики в глазах
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.arc(cx - size*0.12, cy - size*0.52, size*0.02, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + size*0.08, cy - size*0.52, size*0.02, 0, Math.PI*2);
        ctx.fill();
        
        // Нос
        ctx.fillStyle = '#f09b9b';
        ctx.beginPath();
        ctx.arc(cx, cy - size*0.45, size*0.04, 0, Math.PI*2);
        ctx.fill();
        
        // Рот
        ctx.strokeStyle = '#8b6b5a';
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.moveTo(cx - size*0.03, cy - size*0.42);
        ctx.quadraticCurveTo(cx, cy - size*0.38, cx + size*0.03, cy - size*0.42);
        ctx.stroke();
        
        // Щёки
        ctx.fillStyle = '#f5c6b1';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(cx - size*0.15, cy - size*0.45, size*0.05, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + size*0.15, cy - size*0.45, size*0.05, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
        
        // Лапки
        ctx.fillStyle = '#e8d5c0';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.ellipse(cx - size*0.2, cy + size*0.1, size*0.1, size*0.15, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + size*0.2, cy + size*0.1, size*0.1, size*0.15, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Хвостик
        ctx.fillStyle = '#f5ede3';
        ctx.beginPath();
        ctx.arc(cx + size*0.3, cy + size*0.1, size*0.1, 0, Math.PI*2);
        ctx.fill();
        
        ctx.restore();
      }

      function drawWillow() {
        const w = canvas.width, h = canvas.height;
        ctx.save(); ctx.shadowBlur = 16; ctx.shadowColor = '#b3a88e';
        ctx.beginPath(); ctx.moveTo(60, h*0.25); ctx.quadraticCurveTo(30, h*0.45, 70, h*0.65); ctx.lineWidth = 4.5; ctx.strokeStyle = '#6f5236'; ctx.stroke();
        for (let i=0; i<9; i++) {
          let x = 50 + i*9, y = h*0.28 + i*32;
          ctx.beginPath(); ctx.arc(x + Math.sin(time*1.2 + i)*7, y, 10, 0, 2*Math.PI); ctx.fillStyle = '#f0e8d2'; ctx.fill();
          ctx.shadowBlur = 22; ctx.fillStyle = '#fdf7e9'; ctx.arc(x + Math.sin(time*1.2 + i)*7, y-4, 6, 0, 2*Math.PI); ctx.fill();
        }
        ctx.beginPath(); ctx.moveTo(w-70, h*0.2); ctx.quadraticCurveTo(w-30, h*0.4, w-80, h*0.6); ctx.strokeStyle = '#6f5236'; ctx.stroke();
        for (let i=0; i<8; i++) {
          let x = w-60 - i*12, y = h*0.24 + i*30;
          ctx.beginPath(); ctx.arc(x + Math.cos(time*1.4 + i)*7, y, 9, 0, 2*Math.PI); ctx.fillStyle = '#efe6d6'; ctx.fill();
          ctx.fillStyle = '#fdf8ed'; ctx.arc(x + Math.cos(time*1.4 + i)*7, y-4, 5, 0, 2*Math.PI); ctx.fill();
        }
        ctx.restore();
      }

      function drawForeground() {
        const w = canvas.width, h = canvas.height;
        ctx.save(); ctx.shadowBlur = 0;
        const grassGrad = ctx.createLinearGradient(0, h-80, 0, h);
        grassGrad.addColorStop(0, '#7fa56b'); grassGrad.addColorStop(1, '#5d8249');
        ctx.fillStyle = grassGrad; ctx.beginPath(); ctx.rect(0, h-80, w, 90); ctx.fill();
        ctx.strokeStyle = '#4a6b3a'; ctx.lineWidth = 3;
        for (let i=0; i<w; i+=30) { ctx.beginPath(); ctx.moveTo(i, h-75); ctx.quadraticCurveTo(i-12, h-110, i-6, h-135); ctx.stroke(); }
        ctx.shadowBlur = 14; ctx.shadowColor = '#ebc47f';
        for (let f=0; f<12; f++) {
          let fx = 50 + f*100, fy = h-85 + Math.sin(f*0.8 + time*1.5)*6;
          ctx.shadowBlur = 0; ctx.beginPath(); ctx.moveTo(fx, fy+15); ctx.lineTo(fx-5, h-60); ctx.strokeStyle = '#5d8249'; ctx.lineWidth = 2.5; ctx.stroke();
          ctx.shadowBlur = 14;
          for (let p=0; p<6; p++) {
            let ang = p * 1.047 + time*0.2;
            let px = fx + Math.cos(ang)*14, py = fy + Math.sin(ang)*10;
            ctx.beginPath(); ctx.arc(px, py, 8, 0, 2*Math.PI); ctx.fillStyle = '#fad6e7'; ctx.fill();
          }
          ctx.beginPath(); ctx.arc(fx, fy, 7, 0, 2*Math.PI); ctx.fillStyle = '#fbe594'; ctx.fill();
          ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(fx-2, fy-2, 3, 0, 2*Math.PI); ctx.fillStyle = '#ffeca3'; ctx.fill();
        }
        ctx.shadowBlur = 20; ctx.shadowColor = '#d4e87b';
        for (let fl=0; fl<8; fl++) {
          let fx = 100 + fl*110 + Math.sin(time*2 + fl)*20, fy = h-120 + Math.cos(time*1.8 + fl)*15;
          ctx.globalAlpha = 0.6 + 0.3 * Math.sin(time*4 + fl);
          ctx.beginPath(); ctx.arc(fx, fy, 4, 0, 2*Math.PI); ctx.fillStyle = '#f9f3b2'; ctx.fill();
          ctx.shadowBlur = 30; ctx.beginPath(); ctx.arc(fx-1, fy-1, 2, 0, 2*Math.PI); ctx.fillStyle = '#fffbe3'; ctx.fill();
        }
        ctx.globalAlpha = 1.0; ctx.restore();
      }

      function drawGreeting() {
        const w = canvas.width, h = canvas.height;
        const isMobile = w < 600;
        ctx.save();
        const plateW = isMobile ? Math.min(380, w * 0.9) : Math.min(600, w * 0.7);
        const plateH = isMobile ? 120 : 150;
        const plateX = w/2 - plateW/2;
        const plateY = isMobile ? h * 0.76 : h * 0.72;
        
        const plateGrad = ctx.createLinearGradient(plateX, plateY, plateX + plateW, plateY + plateH);
        plateGrad.addColorStop(0, '#3a281ad9'); plateGrad.addColorStop(0.5, '#4f3826d9'); plateGrad.addColorStop(1, '#2e1f12d9');
        ctx.fillStyle = plateGrad; ctx.shadowBlur = isMobile ? 20 : 30; ctx.shadowColor = '#d4a76a'; ctx.shadowOffsetY = isMobile ? 4 : 6;
        ctx.beginPath(); ctx.rect(plateX, plateY, plateW, plateH); ctx.fill();
        ctx.shadowBlur = isMobile ? 14 : 20; ctx.strokeStyle = '#ebd3aa'; ctx.lineWidth = isMobile ? 3 : 4; ctx.stroke();

        const textGrad = ctx.createLinearGradient(plateX + 20, plateY + 20, plateX + plateW - 20, plateY + plateH - 20);
        textGrad.addColorStop(0, '#ffe6a8'); textGrad.addColorStop(0.3, '#fff8e0'); textGrad.addColorStop(0.7, '#ffdf99'); textGrad.addColorStop(1, '#eebb77');
        ctx.shadowBlur = isMobile ? 20 : 30; ctx.shadowColor = '#1f130a'; ctx.shadowOffsetY = isMobile ? 3 : 5;
        ctx.textAlign = 'center';
        
        const baseY = plateY + (isMobile ? 35 : 45);
        const lineSpacing = isMobile ? 26 : 38;
        const nameSpacing = isMobile ? 24 : 34;
        const lastSpacing = isMobile ? 24 : 30;
        
        ctx.font = `bold ${isMobile ? 34 : 58}px 'Georgia', 'Times New Roman', serif`;
        ctx.fillStyle = textGrad; ctx.fillText(greeting.line1, w/2, baseY);
        ctx.font = `italic ${isMobile ? 24 : 42}px 'Georgia', serif`;
        ctx.fillStyle = '#f5dbb0'; ctx.fillText(greeting.line2, w/2, baseY + lineSpacing);
        ctx.font = `600 ${isMobile ? 30 : 50}px 'Georgia', serif`;
        const nameGrad = ctx.createLinearGradient(w/2 - 100, 0, w/2 + 100, 0);
        nameGrad.addColorStop(0, '#ffe09c'); nameGrad.addColorStop(1, '#fff1cf');
        ctx.fillStyle = nameGrad; ctx.fillText(greeting.name, w/2, baseY + lineSpacing + nameSpacing);
        ctx.font = `italic ${isMobile ? 22 : 38}px 'Georgia', serif`;
        ctx.fillStyle = '#eedbba'; ctx.fillText(greeting.line3, w/2, baseY + lineSpacing + nameSpacing + lastSpacing);
        ctx.restore();
      }

      function updateParticles() {
        for (let p of particles) {
          p.x += p.speedX + Math.sin(time*0.3 + p.phase)*0.015;
          p.y += p.speedY;
          if (p.y < -30) { p.y = canvas.height + 20; p.x = Math.random()*canvas.width; }
          if (p.x < -30) p.x = canvas.width + 20;
          if (p.x > canvas.width+30) p.x = -20;
          p.opacity = 0.3 + 0.4 * Math.sin(time*2.5 + p.phase);
        }
      }

      function drawParticles() {
        ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = '#f5d797';
        for (let p of particles) {
          ctx.globalAlpha = p.opacity * 0.9;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.7, 0, 2*Math.PI); ctx.fillStyle = p.color; ctx.fill();
          ctx.shadowBlur = 30;
          ctx.beginPath(); ctx.arc(p.x-1.5, p.y-1.5, p.size*0.35, 0, 2*Math.PI); ctx.fillStyle = '#ffffea'; ctx.fill();
        }
        ctx.restore();
      }

      function drawRays() {
        ctx.save(); ctx.shadowBlur = 55; ctx.shadowColor = '#fbeab6'; ctx.globalAlpha = 0.15 + 0.05*Math.sin(time*1.1);
        const cx = canvas.width/2, cy = canvas.height*0.3;
        for (let i=0; i<16; i++) {
          let angle = i*0.85 + time*0.04;
          let dx = Math.cos(angle)*450, dy = Math.sin(angle)*320;
          ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+dx, cy+dy); ctx.lineTo(cx+dx*0.55, cy+dy*0.55+35); ctx.closePath();
          ctx.fillStyle = '#fff5db'; ctx.fill();
        }
        ctx.restore();
      }

      function drawScene() {
        time += 0.02;
        updateParticles();
        drawAnimatedBackground();
        drawRays();
        drawWillow();

        const w = canvas.width, h = canvas.height;
        const isMobile = w < 600;
        
        // Яйца над куличом (хорошо видны)
        if (isMobile) {
          const eggW = 65, eggH = 90;
          // Два яйца слева и справа над куличом
          drawEgg(w*0.3, h*0.3, eggW, eggH, '#e4c6b3', '#b3442c', 'floral', 0.2);
          drawEgg(w*0.7, h*0.3, eggW, eggH, '#c3d6c1', '#3b6e4b', 'lace', -0.15);
          // Ещё два чуть ниже, но всё ещё над куличом
          drawEgg(w*0.2, h*0.42, eggW, eggH, '#f2d5b1', '#b5742f', 'geometric', 0.3);
          drawEgg(w*0.8, h*0.42, eggW, eggH, '#d4bfe0', '#6a4e8a', 'floral', -0.25);
          
          // Кулич
          const kulichW = Math.min(240, w*0.55);
          const kulichH = Math.min(220, h*0.38);
          drawKulich(w/2, h*0.52, kulichW, kulichH);
          
          // Кролик справа от кулича
          drawRabbit(w*0.8, h*0.6, 60);
        } else {
          // Десктоп: яйца над куличом
          drawEgg(w*0.25, h*0.32, 75, 100, '#e4c6b3', '#b3442c', 'floral', 0.2);
          drawEgg(w*0.75, h*0.32, 75, 100, '#c3d6c1', '#3b6e4b', 'lace', -0.15);
          drawEgg(w*0.18, h*0.45, 70, 95, '#f2d5b1', '#b5742f', 'geometric', 0.3);
          drawEgg(w*0.82, h*0.45, 70, 95, '#d4bfe0', '#6a4e8a', 'floral', -0.25);
          drawEgg(w*0.5, h*0.38, 80, 110, '#f5cdb0', '#bd5a3c', 'lace', 0.1);
          
          const kulichW = Math.min(300, w*0.36);
          const kulichH = Math.min(280, h*0.42);
          drawKulich(w/2, h*0.55, kulichW, kulichH);
          
          // Кролик
          drawRabbit(w*0.75, h*0.62, 75);
        }
        
        drawForeground();
        drawParticles();
        drawGreeting();
        requestAnimationFrame(drawScene);
      }

      drawScene();
      window.addEventListener('resize', () => {
        resizeCanvas();
        particles.forEach(p => {
          p.x = Math.min(canvas.width, Math.max(0, p.x));
          p.y = Math.min(canvas.height, Math.max(0, p.y));
        });
      });
    })();
  </script>
</body>
</html>
