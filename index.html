<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🐇 Пасхальная открытка · Кролик и яйца</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9e7e0 0%, #f5d9e8 40%, #d9e4f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Мерцающие блёстки (фоновые) */
        .sparkle {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .sparkle span {
            position: absolute;
            display: block;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 8px #fff9d7;
            animation: floatSparkle 8s infinite ease-in-out;
        }

        .sparkle span:nth-child(1) { top: 10%; left: 15%; width: 7px; height: 7px; animation-duration: 9s; }
        .sparkle span:nth-child(2) { top: 25%; left: 85%; width: 4px; height: 4px; animation-duration: 6s; animation-delay: 1s; }
        .sparkle span:nth-child(3) { top: 70%; left: 8%; width: 9px; height: 9px; animation-duration: 11s; animation-delay: 0.5s; }
        .sparkle span:nth-child(4) { top: 80%; left: 90%; width: 6px; height: 6px; animation-duration: 7s; animation-delay: 2s; }
        .sparkle span:nth-child(5) { top: 45%; left: 50%; width: 5px; height: 5px; animation-duration: 10s; animation-delay: 1.8s; }
        .sparkle span:nth-child(6) { top: 15%; left: 40%; width: 3px; height: 3px; animation-duration: 5s; }
        .sparkle span:nth-child(7) { top: 60%; left: 30%; width: 8px; height: 8px; animation-duration: 9s; animation-delay: 0.7s; }
        .sparkle span:nth-child(8) { top: 88%; left: 60%; width: 4px; height: 4px; animation-duration: 6.5s; }

        @keyframes floatSparkle {
            0% { transform: translateY(0px) scale(1); opacity: 0.3; }
            50% { transform: translateY(-25px) scale(1.3); opacity: 0.9; }
            100% { transform: translateY(0px) scale(1); opacity: 0.3; }
        }

        /* Основная открытка */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px 48px 48px 48px;
            padding: 28px 22px 36px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 215, 215, 0.5) inset, 0 0 30px rgba(255, 220, 150, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease;
            animation: cardGlow 4s infinite alternate;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 215, 215, 0.5) inset, 0 0 30px rgba(255, 220, 150, 0.3); }
            100% { box-shadow: 0 30px 60px -5px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(255, 245, 200, 0.8) inset, 0 0 50px rgba(255, 235, 120, 0.7); }
        }

        .card-inner {
            border: 2px dashed rgba(230, 180, 150, 0.5);
            border-radius: 32px;
            padding: 20px 16px;
            background: rgba(255, 250, 240, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            position: relative;
        }

        .title {
            text-align: center;
            font-size: clamp(2.2rem, 12vw, 3.5rem);
            font-weight: 800;
            letter-spacing: 4px;
            color: #6b3e2c;
            text-shadow: 0 4px 10px rgba(255, 215, 150, 0.7), 0 0 5px #fff3d1;
            margin-bottom: 8px;
            animation: softPulse 3s infinite;
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 400;
            color: #7a4e3a;
            margin-bottom: 20px;
            letter-spacing: 2px;
            opacity: 0.9;
            text-shadow: 0 2px 5px #ffeac1;
        }

        /* Сцена */
        .easter-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 5px 0 5px;
            position: relative;
        }

        /* Улучшенная трава с цветами */
        .grass {
            width: 100%;
            height: 30px;
            background: linear-gradient(90deg, #6f9e6f, #8fb88f, #a1c9a1, #7fb07f);
            border-radius: 30px 30px 15px 15px;
            margin-top: -2px;
            box-shadow: 0 8px 8px -4px rgba(40, 60, 20, 0.15), inset 0 3px 8px #d4e8b0;
            position: relative;
            z-index: 4;
            overflow: visible;
        }

        .grass::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 15px;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 12px,
                #5d8c5d 12px,
                #5d8c5d 14px,
                transparent 14px);
            top: -8px;
            left: 0;
            opacity: 0.6;
            border-radius: 20px 20px 0 0;
        }

        .grass::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 10px;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 20px,
                #7aa37a 20px,
                #7aa37a 22px,
                transparent 22px);
            top: -5px;
            left: 5px;
            opacity: 0.5;
        }

        /* Цветочки на траве */
        .flower {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        .flower-1 {
            bottom: 12px;
            left: 10%;
            width: 16px;
            height: 16px;
            background: #ffb7c5;
            border-radius: 50%;
            box-shadow: 0 0 0 3px #ffd9e2, 20px 2px 0 #f9e076, 40px -5px 0 #c5b0e5, -15px 0px 0 #f9c28b;
        }

        .flower-1::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff3b0;
            border-radius: 50%;
            top: 5px;
            left: 5px;
            box-shadow: 20px 2px 0 #fff3b0, 40px -5px 0 #fff3b0, -15px 0px 0 #fff3b0;
        }

        .flower-2 {
            bottom: 10px;
            right: 15%;
            width: 12px;
            height: 12px;
            background: #b5d3e7;
            border-radius: 50%;
            box-shadow: 0 0 0 3px #d9ecfa, -25px -3px 0 #f7cfb0, 30px -8px 0 #e3b3d1;
        }

        .flower-2::after {
            content: "";
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fffbe3;
            border-radius: 50%;
            top: 3px;
            left: 4px;
            box-shadow: -25px -3px 0 #fffbe3, 30px -8px 0 #fffbe3;
        }

        /* Контейнер для элементов (кулич, яйца, кролик) */
        .goods {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 0;
            position: relative;
            z-index: 5;
        }

        /* ----- КУЛИЧ ----- */
        .kulich {
            position: relative;
            width: 120px;
            filter: drop-shadow(0 12px 10px rgba(0,0,0,0.1));
            margin-right: 5px;
            z-index: 3;
        }

        .kulich-body {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #c98a5e, #a5633a, #b5734a);
            border-radius: 40% 40% 25% 25% / 50% 50% 20% 20%;
            box-shadow: inset 0 -8px 0 #7b4a2a, inset 0 8px 15px #f3c19d, 0 6px 0 #5e3a1e;
            position: relative;
            z-index: 2;
        }

        .glaze {
            position: absolute;
            top: -15px;
            left: -5%;
            width: 110%;
            height: 45px;
            background: radial-gradient(circle at 30% 20%, #fff9f0, #fbe9d2);
            border-radius: 60% 60% 30% 30% / 70% 70% 30% 30%;
            box-shadow: 0 8px 12px -4px rgba(100, 50, 20, 0.2), inset 0 -3px 0 #eaceb0;
            z-index: 3;
            border-bottom: 2px solid #f5d5b0;
        }

        .sprinkles {
            position: absolute;
            top: 2px;
            left: 10px;
            right: 10px;
            height: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            pointer-events: none;
        }

        .sprinkle {
            width: 8px;
            height: 8px;
            border-radius: 2px 4px 2px 4px;
            background: #f7d44a;
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
            transform: rotate(15deg);
            margin: 2px;
        }
        .sprinkle:nth-child(2) { background: #e86f8c; width: 7px; height: 7px; transform: rotate(-20deg); }
        .sprinkle:nth-child(3) { background: #6cc4b2; width: 9px; height: 5px; }
        .sprinkle:nth-child(4) { background: #b186d1; width: 6px; height: 8px; transform: rotate(35deg); }
        .sprinkle:nth-child(5) { background: #f7b731; width: 8px; height: 6px; transform: rotate(-10deg); }
        .sprinkle:nth-child(6) { background: #e35f5f; width: 7px; height: 7px; }
        .sprinkle:nth-child(7) { background: #a5d66b; width: 9px; height: 5px; transform: rotate(45deg); }

        .candle {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 20px;
            background: #f9e7b3;
            border-radius: 4px 4px 2px 2px;
            box-shadow: 0 2px 0 #dbb87c;
            z-index: 4;
        }
        .flame {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 18px;
            background: radial-gradient(circle, #ffd966 10%, #ff9900 70%, #ff6600);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            filter: blur(0.8px);
            box-shadow: 0 0 20px #ffbb33;
            animation: flicker 0.8s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.9; transform: translateX(-50%) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.08); box-shadow: 0 0 28px #ffaa22; }
        }

        /* ----- ЯЙЦА ----- */
        .eggs {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 8px;
            z-index: 2;
        }

        .egg {
            width: 58px;
            height: 74px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 8px 0 rgba(0,0,0,0.08), 0 12px 18px -6px rgba(0,0,0,0.15), inset 0 -8px 8px rgba(0,0,0,0.03);
            position: relative;
            animation: eggFloat 4s infinite alternate ease-in-out;
            transition: transform 0.2s;
            overflow: hidden;
        }

        .egg:nth-child(1) {
            background: linear-gradient(145deg, #fad0c4, #f3a7b3);
            transform: rotate(2deg);
        }
        .egg:nth-child(2) {
            background: linear-gradient(145deg, #c9e4de, #a3d0c1);
            transform: rotate(-3deg);
            animation-delay: 0.6s;
            width: 55px;
            height: 72px;
        }
        .egg:nth-child(3) {
            background: linear-gradient(145deg, #f9e6b3, #f3cd7a);
            transform: rotate(5deg);
            animation-delay: 1.2s;
            width: 60px;
            height: 76px;
        }

        @keyframes eggFloat {
            0% { transform: translateY(0px) rotate(2deg); }
            100% { transform: translateY(-8px) rotate(-1deg); }
        }

        .egg .pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .egg:first-child .pattern::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background: #d95b7a;
            border-radius: 4px;
            transform: rotate(45deg);
            top: 18px;
            left: 12px;
            box-shadow: 20px 20px 0 #f3e3c9, 30px 10px 0 #d95b7a, 10px 35px 0 #f3e3c9;
        }
        .egg:first-child .pattern::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff9e6;
            border-radius: 50%;
            top: 30px;
            right: 15px;
            box-shadow: -10px 15px 0 #fff9e6, -20px 5px 0 #d95b7a;
        }

        .egg:nth-child(2) .pattern::before {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            background: #4a7c6b;
            border-radius: 40% 10% 40% 10%;
            top: 12px;
            left: 8px;
            box-shadow: 18px 18px 0 #b1d0c4, 0px 30px 0 #4a7c6b;
        }
        .egg:nth-child(2) .pattern::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f5eace;
            border-radius: 50%;
            bottom: 18px;
            right: 12px;
            box-shadow: -15px -15px 0 #f5eace, -25px -5px 0 #4a7c6b;
        }

        .egg:nth-child(3) .pattern::before {
            content: "✿";
            position: absolute;
            font-size: 18px;
            color: #d68b45;
            text-shadow: 0 2px 3px rgba(0,0,0,0.1);
            top: 15px;
            left: 15px;
            transform: rotate(-10deg);
        }
        .egg:nth-child(3) .pattern::after {
            content: "";
            position: absolute;
            width: 35px;
            height: 6px;
            background: #b8a07c;
            border-radius: 10px;
            bottom: 22px;
            left: 10px;
            box-shadow: 0 12px 0 #eac784, 0 24px 0 #b8a07c;
            opacity: 0.8;
        }

        /* ----- КРОЛИК (усы исправлены) ----- */
        .rabbit {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: -8px;
            margin-right: 8px;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.1));
            z-index: 10;
            transform: translateY(8px);
        }

        .rabbit-body {
            position: relative;
            width: 65px;
            height: 55px;
            background: #e5d5c0;
            border-radius: 45% 45% 40% 40% / 60% 60% 30% 30%;
            box-shadow: inset 0 -4px 0 #c0a78b, 0 4px 0 #b2977a;
        }

        .rabbit-head {
            position: absolute;
            top: -25px;
            left: 7px;
            width: 45px;
            height: 40px;
            background: #e5d5c0;
            border-radius: 50% 50% 45% 45%;
            box-shadow: inset 0 -2px 5px #ccb79e;
        }

        .rabbit-ear-left,
        .rabbit-ear-right {
            position: absolute;
            width: 18px;
            height: 42px;
            background: #dccbb6;
            border-radius: 60% 60% 30% 30%;
            top: -32px;
            box-shadow: inset 0 -4px 0 #b8a084;
        }
        .rabbit-ear-left {
            left: -5px;
            transform: rotate(-15deg);
        }
        .rabbit-ear-right {
            right: -5px;
            transform: rotate(15deg);
        }
        .rabbit-ear-inner {
            width: 10px;
            height: 28px;
            background: #f3d9cb;
            border-radius: 50%;
            margin: 6px auto 0;
        }

        .rabbit-eye {
            position: absolute;
            width: 6px;
            height: 8px;
            background: #3f2e22;
            border-radius: 50%;
            top: 12px;
            left: 11px;
            box-shadow: 18px 0 0 #3f2e22;
        }
        .rabbit-eye::after {
            content: "";
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 1px;
            box-shadow: 18px 0 0 white;
        }

        .rabbit-nose {
            position: absolute;
            width: 8px;
            height: 6px;
            background: #f4a3a8;
            border-radius: 40%;
            top: 20px;
            left: 19px;
        }

        /* Усы аккуратные */
        .rabbit-whisker {
            position: absolute;
            width: 12px;
            height: 1.5px;
            background: #a58e78;
            border-radius: 2px;
            top: 24px;
            left: -2px;
            box-shadow: 
                0 3px 0 #a58e78,
                0 -3px 0 #a58e78,
                34px 0 0 #a58e78,
                34px 3px 0 #a58e78,
                34px -3px 0 #a58e78;
        }

        .rabbit-tail {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #f9f2e7;
            border-radius: 50%;
            right: -8px;
            bottom: 8px;
            box-shadow: 0 2px 3px rgba(0,0,0,0.05);
        }

        /* Веточки вербы */
        .willow {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 10px 0 5px;
        }

        .willow-branch {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bud {
            width: 16px;
            height: 16px;
            background: #d4d4c1;
            border-radius: 50% 50% 30% 30%;
            box-shadow: 0 0 0 3px #efeae2, 0 3px 5px rgba(0,0,0,0.05);
            position: relative;
        }
        .bud::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f5f0e3;
            border-radius: 50%;
            top: 3px;
            left: 4px;
        }
        .stem {
            width: 25px;
            height: 3px;
            background: #8b9a6b;
            border-radius: 5px;
        }

        .message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            color: #5a3e2e;
            margin: 16px 0 8px;
            line-height: 1.5;
            text-shadow: 0 2px 10px #ffeac1;
            background: rgba(255,245,220,0.3);
            padding: 12px 10px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
        }

        .signature {
            text-align: right;
            font-style: italic;
            color: #7a5a4a;
            margin-top: 12px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        @media (max-width: 380px) {
            .card { padding: 20px 12px 30px; }
            .goods { gap: 6px; }
            .kulich { width: 100px; }
            .kulich-body { height: 100px; }
            .egg { width: 48px; height: 62px; }
            .rabbit-body { width: 55px; height: 45px; }
        }

        @keyframes softPulse {
            0% { opacity: 0.95; text-shadow: 0 4px 12px #ffefcf, 0 0 8px #fff0d0; }
            100% { opacity: 1; text-shadow: 0 6px 18px #ffe4a1, 0 0 15px #ffddb0; }
        }

        .glow-text {
            animation: textGlow 3s infinite alternate;
        }
        @keyframes textGlow {
            from { text-shadow: 0 0 8px #fff0c0; }
            to { text-shadow: 0 0 18px #ffe29c, 0 0 30px #ffd27f; }
        }
    </style>
</head>
<body>

<div class="sparkle">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="card">
    <div class="card-inner">
        <div class="title glow-text">✦ ХВ ✦</div>
        <div class="subtitle">Христос Воскрес!!!</div>

        <div class="easter-scene">
            <div class="goods">
                <div class="kulich">
                    <div class="candle"><div class="flame"></div></div>
                    <div class="glaze">
                        <div class="sprinkles">
                            <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                            <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                            <div class="sprinkle"></div>
                        </div>
                    </div>
                    <div class="kulich-body"></div>
                </div>

                <div class="eggs">
                    <div class="egg"><div class="pattern"></div></div>
                    <div class="egg"><div class="pattern"></div></div>
                    <div class="egg"><div class="pattern"></div></div>
                </div>

                <div class="rabbit">
                    <div class="rabbit-body">
                        <div class="rabbit-tail"></div>
                        <div class="rabbit-head">
                            <div class="rabbit-ear-left"><div class="rabbit-ear-inner"></div></div>
                            <div class="rabbit-ear-right"><div class="rabbit-ear-inner"></div></div>
                            <div class="rabbit-eye"></div>
                            <div class="rabbit-nose"></div>
                            <div class="rabbit-whisker"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grass">
                <div class="flower flower-1"></div>
                <div class="flower flower-2"></div>
            </div>
        </div>

        <div class="willow">
            <div class="willow-branch">
                <div class="stem"></div>
                <div class="bud"></div>
                <div class="bud"></div>
            </div>
            <div class="willow-branch">
                <div class="bud"></div>
                <div class="bud"></div>
                <div class="stem"></div>
            </div>
        </div>

        <div class="message">
            Светлой Пасхи!<br>
            Пусть в доме будет тепло,<br>
            а сердце наполняется радостью!
        </div>
        <div class="signature">✿ с любовью ✿</div>
    </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
    (function() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        // УМЕНЬШЕНО КОЛИЧЕСТВО ЧАСТИЦ И РАЗМЕР ДЛЯ ПЛАВНОСТИ НА ТЕЛЕФОНЕ
        let particles = [];
        const particleCount = 25;        // было 45
        const colors = ['#f9d6e0', '#fce1a4', '#c5e0c5', '#b4d0e7', '#f3c3b2', '#e7c6cf'];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * -height * 0.3,
                    size: Math.random() * 5 + 3,    // максимальный размер ~8 → теперь ~6
                    speedY: Math.random() * 1.5 + 1,
                    speedX: Math.random() * 0.4 - 0.2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 1.5,
                    shape: Math.random() > 0.5 ? 'circle' : 'rect'
                });
            }
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                // убрали shadowBlur для производительности
                ctx.shadowColor = 'transparent';
                
                if (p.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size/1.8);
                }
                ctx.restore();
                
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += p.rotationSpeed;
                
                if (p.y > height + 30) {
                    p.y = -20;
                    p.x = Math.random() * width;
                }
                if (p.x > width + 20) p.x = -10;
                if (p.x < -20) p.x = width + 10;
            }
            requestAnimationFrame(drawConfetti);
        }

        initParticles();
        drawConfetti();

        const card = document.querySelector('.card');
        card.addEventListener('click', () => {
            card.style.transform = 'scale(0.99)';
            setTimeout(() => card.style.transform = '', 100);
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                resizeCanvas();
                initParticles();
            }, 50);
        });
    })();
</script>
</body>
</html>
